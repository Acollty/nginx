# 默认服务器配置
# 用于 Let's Encrypt 验证和默认响应

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Let's Encrypt webroot 验证
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    # 阻止 PHP 文件执行
    location ~ \.php$ {
        return 444;
    }

    # 默认响应
    location / {
        return 404;
    }
}
